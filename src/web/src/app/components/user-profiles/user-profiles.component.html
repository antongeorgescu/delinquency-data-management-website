<div class="row">
  <div class="col-md-12">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h3 class="card-title mb-0">
          <i class="bi bi-people"></i> User Profiles
        </h3>
        <button class="btn btn-outline-primary" (click)="loadUserProfiles()" [disabled]="loading">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
      </div>
      <div class="card-body">
        <!-- Loading Spinner -->
        <div *ngIf="loading" class="loading-spinner">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
        
        <!-- Error Message -->
        <div *ngIf="error" class="alert alert-danger" role="alert">
          <i class="bi bi-exclamation-triangle"></i> {{ error }}
        </div>
        
        <!-- Data Table -->
        <div *ngIf="!loading && !error" class="table-responsive">
          <table class="table table-striped table-hover">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Created Date</th>
                <th>ID</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let user of userProfiles">
                <td>{{ user.first_name }} {{ user.last_name }}</td>
                <td>{{ user.email }}</td>
                <td>{{ formatDate(user.created_at) }}</td>
                <td><small class="text-muted">{{ user.id.substring(0, 8) }}...</small></td>
              </tr>
            </tbody>
          </table>
          
          <div *ngIf="userProfiles.length === 0" class="text-center text-muted py-4">
            <i class="bi bi-inbox display-4 d-block mb-3"></i>
            <p>No user profiles found. Generate some data first.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
